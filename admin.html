<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>BTCM Pro - Admin Panel</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #0a0e1a; color: #ffffff; padding: 20px; }
        .glass-card { background: rgba(255,255,255,0.05); backdrop-filter: blur(10px); border-radius: 24px; border: 1px solid rgba(99,102,241,0.3); padding: 24px; }
        .btn { padding: 12px 24px; border-radius: 12px; border: none; font-weight: 600; cursor: pointer; font-family: inherit; transition: all 0.3s ease; }
        .btn-primary { background: linear-gradient(135deg, #6366f1, #4f46e5); color: #fff; }
        .btn-success { background: #10b981; color: #fff; }
        .btn-danger { background: #ef4444; color: #fff; }
        .btn-warning { background: #f59e0b; color: #fff; }
        .btn-secondary { background: rgba(255,255,255,0.1); color: #fff; }
        input, select { width: 100%; padding: 12px 16px; background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; color: #fff; margin-bottom: 12px; }
        input:focus, select:focus { outline: none; border-color: #6366f1; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px,1fr)); gap: 20px; margin-bottom: 20px; }
        .stat-card { background: linear-gradient(135deg, rgba(99,102,241,0.15), rgba(139,92,246,0.05)); border-radius: 20px; padding: 24px; text-align: center; border: 1px solid rgba(99,102,241,0.2); }
        .stat-value { font-size: 36px; font-weight: 800; background: linear-gradient(135deg, #fff, #6366f1); -webkit-background-clip: text; background-clip: text; color: transparent; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 14px; text-align: left; border-bottom: 1px solid rgba(255,255,255,0.08); }
        th { color: #6366f1; font-weight: 600; }
        .nav-tabs { display: flex; gap: 12px; margin-bottom: 24px; flex-wrap: wrap; }
        .tab { padding: 12px 24px; background: rgba(255,255,255,0.05); border-radius: 60px; cursor: pointer; transition: all 0.3s ease; font-weight: 500; }
        .tab.active { background: linear-gradient(135deg, #6366f1, #4f46e5); color: #fff; }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .admin-container { max-width: 1400px; margin: 0 auto; }
        .admin-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
        .logo { font-size: 24px; font-weight: 800; background: linear-gradient(135deg, #6366f1, #ec4899); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .status-badge { padding: 4px 12px; border-radius: 40px; font-size: 12px; font-weight: 500; display: inline-block; }
        .status-pending { background: #f59e0b20; color: #f59e0b; }
        .status-completed { background: #10b98120; color: #10b981; }
        .search-box { display: flex; gap: 12px; margin-bottom: 20px; }
        .search-box input { flex: 1; margin-bottom: 0; }
        .search-box button { margin-bottom: 0; }
    </style>
</head>
<body>
<div id="adminPanel">
    <div class="admin-container">
        <div class="admin-header">
            <div><i class="fas fa-chart-line" style="color: #6366f1;"></i> <span class="logo"> BTCM PRO ADMIN</span></div>
            <button class="btn btn-secondary" onclick="logoutAdmin()"><i class="fas fa-sign-out-alt"></i> Exit</button>
        </div>

        <!-- Setup Container -->
        <div id="setupContainer" style="display:none">
            <div class="glass-card" style="max-width:500px;margin:0 auto;text-align:center">
                <i class="fas fa-shield-alt" style="font-size:50px;color:#6366f1;margin-bottom:20px"></i>
                <h2 style="margin-bottom:20px">Admin Setup</h2>
                <input type="email" id="setupEmail" placeholder="Admin Email">
                <input type="password" id="setupPassword" placeholder="Admin Password">
                <button class="btn btn-primary" onclick="setupAdmin()" style="width:100%">Create Admin Account</button>
            </div>
        </div>

        <!-- Login Container -->
        <div id="loginContainer" style="display:none">
            <div class="glass-card" style="max-width:500px;margin:0 auto;text-align:center">
                <i class="fas fa-lock" style="font-size:50px;color:#6366f1;margin-bottom:20px"></i>
                <h2 style="margin-bottom:20px">Admin Login</h2>
                <input type="email" id="loginEmail" placeholder="Admin Email">
                <input type="password" id="loginPassword" placeholder="Password">
                <button class="btn btn-primary" onclick="adminLogin()" style="width:100%">Login</button>
            </div>
        </div>

        <!-- Dashboard Container -->
        <div id="dashboardContainer" style="display:none">
            <!-- Tabs -->
            <div class="nav-tabs">
                <div class="tab active" onclick="switchTab('stats')">📊 Dashboard</div>
                <div class="tab" onclick="switchTab('deposits')">💰 Deposits</div>
                <div class="tab" onclick="switchTab('withdrawals')">💸 Withdrawals</div>
                <div class="tab" onclick="switchTab('users')">👥 Users</div>
                <div class="tab" onclick="switchTab('wallet')">🏦 Wallet Settings</div>
                <div class="tab" onclick="switchTab('security')">🔒 Security</div>
            </div>

            <!-- Stats Tab -->
            <div id="statsTab" class="tab-content active">
                <div class="stats-grid" id="statsGrid"></div>
                <div class="glass-card" style="margin-top:20px">
                    <h3 style="margin-bottom:16px">📋 Recent Users</h3>
                    <div id="recentUsersList"></div>
                </div>
            </div>

            <!-- Deposits Tab -->
            <div id="depositsTab" class="tab-content">
                <div class="glass-card">
                    <h3 style="margin-bottom:16px">💵 Pending Deposits</h3>
                    <div id="pendingDepositsList"></div>
                </div>
            </div>

            <!-- Withdrawals Tab -->
            <div id="withdrawalsTab" class="tab-content">
                <div class="glass-card">
                    <h3 style="margin-bottom:16px">💸 Pending Withdrawals</h3>
                    <div id="pendingWithdrawalsList"></div>
                </div>
            </div>

            <!-- Users Tab -->
            <div id="usersTab" class="tab-content">
                <div class="glass-card">
                    <div class="search-box">
                        <input type="text" id="searchUser" placeholder="Search by name or email...">
                        <button class="btn btn-primary" onclick="loadUsersList()"><i class="fas fa-search"></i> Search</button>
                    </div>
                    <div id="usersList"></div>
                </div>
            </div>

            <!-- Wallet Settings Tab -->
            <div id="walletTab" class="tab-content">
                <div class="glass-card">
                    <h3 style="margin-bottom:16px">🏦 Deposit Wallet Addresses</h3>
                    <p style="font-size:12px;opacity:0.7;margin-bottom:20px">Changing these will update the addresses shown to users.</p>
                    <div id="walletSettingsEditor"></div>
                </div>
            </div>

            <!-- Security Tab -->
            <div id="securityTab" class="tab-content">
                <div class="glass-card">
                    <h3 style="margin-bottom:16px">🔐 Change Admin Password</h3>
                    <input type="password" id="newAdminPassword" placeholder="New Password">
                    <button class="btn btn-primary" onclick="updateAdminPassword()">Update Password</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // ==================== Firebase Config ====================
    const firebaseConfig = {
        apiKey: "AIzaSyDegGMXh3i3TgC_FhbG_Rx6SUm8fHMZFxI",
        authDomain: "btcm-pro-app.firebaseapp.com",
        projectId: "btcm-pro-app",
        storageBucket: "btcm-pro-app.firebasestorage.app",
        messagingSenderId: "770958307322",
        appId: "1:770958307322:web:3b5488c6e3f23ea1127e43"
    };
    
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();
    
    // ==================== Admin Check ====================
    async function checkAdminStatus() {
        const user = auth.currentUser;
        if(user) {
            const adminDoc = await db.collection('admin').doc('settings').get();
            const adminEmail = adminDoc.exists ? adminDoc.data().adminEmail : null;
            if(user.email === adminEmail) {
                showDashboard();
            } else {
                await auth.signOut();
                showLogin();
            }
        } else {
            const adminDoc = await db.collection('admin').doc('settings').get();
            if(adminDoc.exists) {
                showLogin();
            } else {
                showSetup();
            }
        }
    }
    
    function showSetup() {
        document.getElementById('setupContainer').style.display = 'block';
        document.getElementById('loginContainer').style.display = 'none';
        document.getElementById('dashboardContainer').style.display = 'none';
    }
    
    function showLogin() {
        document.getElementById('setupContainer').style.display = 'none';
        document.getElementById('loginContainer').style.display = 'block';
        document.getElementById('dashboardContainer').style.display = 'none';
    }
    
    function showDashboard() {
        document.getElementById('setupContainer').style.display = 'none';
        document.getElementById('loginContainer').style.display = 'none';
        document.getElementById('dashboardContainer').style.display = 'block';
        loadDashboardData();
    }
    
    // ==================== Admin Setup ====================
    async function setupAdmin() {
        const email = document.getElementById('setupEmail').value.trim();
        const password = document.getElementById('setupPassword').value;
        
        if(!email || !password) {
            alert('Please fill all fields');
            return;
        }
        
        try {
            const userCredential = await auth.createUserWithEmailAndPassword(email, password);
            await db.collection('admin').doc('settings').set({ adminEmail: email });
            alert('Admin account created! Please login.');
            showLogin();
        } catch(error) {
            if(error.code === 'auth/email-already-in-use') {
                await db.collection('admin').doc('settings').set({ adminEmail: email });
                alert('Admin set! Please login.');
                showLogin();
            } else {
                alert('Error: ' + error.message);
            }
        }
    }
    
    // ==================== Admin Login ====================
    async function adminLogin() {
        const email = document.getElementById('loginEmail').value.trim();
        const password = document.getElementById('loginPassword').value;
        
        if(!email || !password) {
            alert('Please fill all fields');
            return;
        }
        
        try {
            await auth.signInWithEmailAndPassword(email, password);
            const adminDoc = await db.collection('admin').doc('settings').get();
            if(adminDoc.exists && adminDoc.data().adminEmail === email) {
                alert('Login successful!');
                showDashboard();
            } else {
                await auth.signOut();
                alert('Not authorized as admin');
            }
        } catch(error) {
            alert('Login failed: ' + error.message);
        }
    }
    
    // ==================== Logout ====================
    async function logoutAdmin() {
        await auth.signOut();
        showLogin();
    }
    
    // ==================== Change Admin Password ====================
    async function updateAdminPassword() {
        const newPassword = document.getElementById('newAdminPassword').value;
        if(!newPassword) {
            alert('Enter new password');
            return;
        }
        try {
            await auth.currentUser.updatePassword(newPassword);
            alert('Password updated successfully!');
            document.getElementById('newAdminPassword').value = '';
        } catch(error) {
            alert('Error: ' + error.message);
        }
    }
    
    // ==================== Load Dashboard Data ====================
    async function loadDashboardData() {
        const usersSnapshot = await db.collection('users').get();
        const users = [];
        usersSnapshot.forEach(doc => users.push({ id: doc.id, ...doc.data() }));
        
        let totalBalance = 0;
        let totalDeposits = 0;
        let totalWithdrawals = 0;
        let pendingDeposits = 0;
        let pendingWithdrawals = 0;
        
        users.forEach(user => {
            totalBalance += user.balance || 0;
            if(user.transactions) {
                user.transactions.forEach(tx => {
                    if(tx.type === 'deposit' && tx.status === 'completed') totalDeposits += tx.amount;
                    if(tx.type === 'withdraw' && tx.status === 'completed') totalWithdrawals += tx.amount;
                    if(tx.type === 'deposit' && tx.status === 'pending') pendingDeposits++;
                    if(tx.type === 'withdraw' && tx.status === 'pending') pendingWithdrawals++;
                });
            }
        });
        
        document.getElementById('statsGrid').innerHTML = `
            <div class="stat-card"><div class="stat-value">${users.length}</div><div>Total Users</div></div>
            <div class="stat-card"><div class="stat-value">$${totalBalance.toFixed(2)}</div><div>Total Balance</div></div>
            <div class="stat-card"><div class="stat-value">$${totalDeposits.toFixed(2)}</div><div>Total Deposits</div></div>
            <div class="stat-card"><div class="stat-value">$${totalWithdrawals.toFixed(2)}</div><div>Total Withdrawals</div></div>
            <div class="stat-card"><div class="stat-value">${pendingDeposits}</div><div>Pending Deposits</div></div>
            <div class="stat-card"><div class="stat-value">${pendingWithdrawals}</div><div>Pending Withdrawals</div></div>
        `;
        
        const recentUsers = users.slice(-5).reverse();
        document.getElementById('recentUsersList').innerHTML = `
            <table>
                <thead><tr><th>Name</th><th>Email</th><th>Balance</th><th>Status</th></tr></thead>
                <tbody>
                    ${recentUsers.map(user => `
                        <tr>
                            <td>${user.name || 'N/A'}</td>
                            <td>${user.email}</td>
                            <td>$${(user.balance || 0).toFixed(2)}</td>
                            <td>${user.hasDeposited ? '<span class="status-badge status-completed">Active</span>' : '<span class="status-badge status-pending">Pending Deposit</span>'}</td>
                        </tr>
                    `).join('')}
                </tbody>
            </table>
        `;
        
        await loadPendingDeposits();
        await loadPendingWithdrawals();
    }
    
    // ==================== Load Pending Deposits ====================
    async function loadPendingDeposits() {
        const usersSnapshot = await db.collection('users').get();
        const pendingDeposits = [];
        
        usersSnapshot.forEach(doc => {
            const user = { id: doc.id, ...doc.data() };
            if(user.transactions) {
                user.transactions.forEach((tx, idx) => {
                    if(tx.type === 'deposit' && tx.status === 'pending') {
                        pendingDeposits.push({ ...tx, userId: user.id, userName: user.name || user.email, txIndex: idx });
                    }
                });
            }
        });
        
        if(pendingDeposits.length === 0) {
            document.getElementById('pendingDepositsList').innerHTML = '<p style="text-align:center;padding:40px">No pending deposits</p>';
            return;
        }
        
        document.getElementById('pendingDepositsList').innerHTML = `
            <table>
                <thead><tr><th>User</th><th>Amount</th><th>Method</th><th>Date</th><th>Action</th></tr></thead>
                <tbody>
                    ${pendingDeposits.map(d => `
                        <tr>
                            <td>${d.userName}</td>
                            <td>$${d.amount.toFixed(2)}</td>
                            <td>${d.method || 'Crypto'}</td>
                            <td>${new Date(d.date).toLocaleString()}</td>
                            <td><button class="btn btn-success" onclick="confirmDeposit('${d.userId}', ${d.txIndex})">✅ Confirm</button></td>
                        </tr>
                    `).join('')}
                </tbody>
            </table>
        `;
    }
    
    async function confirmDeposit(userId, txIndex) {
        const userRef = db.collection('users').doc(userId);
        const userDoc = await userRef.get();
        const user = userDoc.data();
        const transactions = [...(user.transactions || [])];
        const tx = transactions[txIndex];
        
        if(tx && tx.type === 'deposit' && tx.status === 'pending') {
            transactions[txIndex] = { ...tx, status: 'completed' };
            const newBalance = (user.balance || 0) + tx.amount;
            await userRef.update({
                balance: newBalance,
                hasDeposited: true,
                transactions: transactions
            });
            alert(`Deposit $${tx.amount} confirmed!`);
            loadDashboardData();
        }
    }
    
    // ==================== Load Pending Withdrawals ====================
    async function loadPendingWithdrawals() {
        const usersSnapshot = await db.collection('users').get();
        const pendingWithdrawals = [];
        
        usersSnapshot.forEach(doc => {
            const user = { id: doc.id, ...doc.data() };
            if(user.transactions) {
                user.transactions.forEach((tx, idx) => {
                    if(tx.type === 'withdraw' && tx.status === 'pending') {
                        pendingWithdrawals.push({ ...tx, userId: user.id, userName: user.name || user.email, txIndex: idx });
                    }
                });
            }
        });
        
        if(pendingWithdrawals.length === 0) {
            document.getElementById('pendingWithdrawalsList').innerHTML = '<p style="text-align:center;padding:40px">No pending withdrawals</p>';
            return;
        }
        
        document.getElementById('pendingWithdrawalsList').innerHTML = `
            <table>
                <thead><tr><th>User</th><th>Amount</th><th>Address</th><th>Method</th><th>Date</th><th>Action</th></tr></thead>
                <tbody>
                    ${pendingWithdrawals.map(w => `
                        <tr>
                            <td>${w.userName}</td>
                            <td>$${w.amount.toFixed(2)}</td>
                            <td><small>${(w.address || 'N/A').substring(0,20)}...</small></td>
                            <td>${w.method || 'USDT'}</td>
                            <td>${new Date(w.date).toLocaleString()}</td>
                            <td>
                                <button class="btn btn-success" onclick="approveWithdraw('${w.userId}', ${w.txIndex})">Approve</button>
                                <button class="btn btn-danger" onclick="rejectWithdraw('${w.userId}', ${w.txIndex})">Reject</button>
                            </td>
                        </tr>
                    `).join('')}
                </tbody>
            </table>
        `;
    }
    
    async function approveWithdraw(userId, txIndex) {
        const userRef = db.collection('users').doc(userId);
        const userDoc = await userRef.get();
        const user = userDoc.data();
        const transactions = [...(user.transactions || [])];
        const tx = transactions[txIndex];
        
        if(tx && tx.type === 'withdraw' && tx.status === 'pending') {
            transactions[txIndex] = { ...tx, status: 'completed' };
            await userRef.update({ transactions: transactions });
            alert(`Withdrawal $${tx.amount} approved!`);
            loadDashboardData();
        }
    }
    
    async function rejectWithdraw(userId, txIndex) {
        const userRef = db.collection('users').doc(userId);
        const userDoc = await userRef.get();
        const user = userDoc.data();
        const transactions = [...(user.transactions || [])];
        const tx = transactions[txIndex];
        
        if(tx && tx.type === 'withdraw' && tx.status === 'pending') {
            transactions[txIndex] = { ...tx, status: 'rejected' };
            const newBalance = (user.balance || 0) + tx.amount + (tx.fee || 0);
            await userRef.update({ balance: newBalance, transactions: transactions });
            alert(`Withdrawal $${tx.amount} rejected. Amount refunded.`);
            loadDashboardData();
        }
    }
    
    // ==================== Load Users List ====================
    async function loadUsersList() {
        const searchTerm = document.getElementById('searchUser').value.toLowerCase();
        let usersSnapshot = await db.collection('users').get();
        let users = [];
        usersSnapshot.forEach(doc => users.push({ id: doc.id, ...doc.data() }));
        
        if(searchTerm) {
            users = users.filter(u => 
                (u.name || '').toLowerCase().includes(searchTerm) || 
                u.email.toLowerCase().includes(searchTerm)
            );
        }
        
        document.getElementById('usersList').innerHTML = `
            <table>
                <thead><tr><th>Name</th><th>Email</th><th>Balance</th><th>Total Invested</th><th>Ref Bonus</th><th>Action</th></tr></thead>
                <tbody>
                    ${users.map(user => `
                        <tr>
                            <td>${user.name || 'N/A'}</td>
                            <td>${user.email}</td>
                            <td>$${(user.balance || 0).toFixed(2)}</td>
                            <td>$${(user.totalInvested || 0).toFixed(2)}</td>
                            <td>$${(user.referralBonus || 0).toFixed(2)}</td>
                            <td><button class="btn btn-warning" onclick="editUserBalance('${user.id}')">✏️ Edit</button></td>
                        </tr>
                    `).join('')}
                </tbody>
            </table>
        `;
    }
    
    async function editUserBalance(userId) {
        const userRef = db.collection('users').doc(userId);
        const userDoc = await userRef.get();
        const currentBalance = userDoc.data().balance || 0;
        const newBalance = prompt('Enter new balance (USD):', currentBalance);
        
        if(newBalance !== null && !isNaN(parseFloat(newBalance))) {
            await userRef.update({ balance: parseFloat(newBalance) });
            alert('Balance updated!');
            loadUsersList();
            loadDashboardData();
        }
    }
    
    // ==================== Wallet Settings ====================
    const DEFAULT_WALLETS = {
        BTC: "bc1qsl8ehutft8v2jpdmnp7x7w9lvrcu7yafw0rk0j",
        ETH: "0xaa4433224156e0BcC84c9d32c6123A55Aef71926",
        USDT: "TWwYEQDnFHqmbPfGXq79P7tLWBogzSUJmw",
        BNB: "0xaa4433224156e0BcC84c9d32c6123A55Aef71926",
        SOL: "AYqfQEN22c1n99QmRawi5WoDqg6yMxiBF8Vo71fKkyb2"
    };
    
    async function loadWalletSettings() {
        const settingsDoc = await db.collection('admin').doc('walletAddresses').get();
        const wallets = settingsDoc.exists ? settingsDoc.data() : DEFAULT_WALLETS;
        
        const networks = [
            { key: "BTC", name: "Bitcoin (BTC)" },
            { key: "ETH", name: "Ethereum (ERC20)" },
            { key: "USDT", name: "USDT (BEP20)" },
            { key: "BNB", name: "BNB (BEP20)" },
            { key: "SOL", name: "Solana" }
        ];
        
        document.getElementById('walletSettingsEditor').innerHTML = networks.map(n => `
            <div style="margin-bottom:20px;padding:16px;background:rgba(255,255,255,0.03);border-radius:20px">
                <label style="display:block;margin-bottom:8px;font-weight:500">${n.name}</label>
                <input type="text" id="wallet_${n.key}" value="${wallets[n.key] || ''}" placeholder="Enter ${n.name} address">
                <button class="btn btn-primary" onclick="saveWalletAddress('${n.key}')" style="margin-top:8px">Save Address</button>
            </div>
        `).join('');
    }
    
    async function saveWalletAddress(key) {
        const address = document.getElementById(`wallet_${key}`).value.trim();
        if(!address) {
            alert('Please enter an address');
            return;
        }
        const settingsDoc = await db.collection('admin').doc('walletAddresses').get();
        const current = settingsDoc.exists ? settingsDoc.data() : {};
        current[key] = address;
        await db.collection('admin').doc('walletAddresses').set(current);
        alert(`${key} address saved!`);
    }
    
    // ==================== Tab Switching ====================
    function switchTab(tab) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.getElementById(`${tab}Tab`).classList.add('active');
        
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        event.target.classList.add('active');
        
        if(tab === 'users') loadUsersList();
        if(tab === 'wallet') loadWalletSettings();
        if(tab === 'stats') loadDashboardData();
        if(tab === 'deposits') loadPendingDeposits();
        if(tab === 'withdrawals') loadPendingWithdrawals();
    }
    
    // ==================== On Load ====================
    window.onload = () => {
        auth.onAuthStateChanged((user) => {
            if(user) {
                checkAdminStatus();
            } else {
                checkAdminStatus();
            }
        });
    };
</script>
</body>
</html>
